[project]
name = "behavior-audit"
version = "1.0.0"
description = "Audit service for BehaviorSense"
requires-python = ">=3.11"

dependencies = [
    "behavior-core",
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0.0",
    "sqlmodel>=0.0.14",
    "asyncpg>=0.29.0",
    "redis[asyncio]>=5.0.0",
]

[tool.uv.sources]
behavior-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/behavior_audit"]
