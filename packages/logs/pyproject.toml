[project]
name = "behavior-logs"
version = "1.0.0"
description = "Event logs service for BehaviorSense"
requires-python = ">=3.11"

dependencies = [
    "behavior-core",
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "clickhouse-connect>=0.6.0",
    "orjson>=3.9.0",
]

[tool.uv.sources]
behavior-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/behavior_logs"]
