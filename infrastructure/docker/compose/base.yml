# BehaviorSense - Base Infrastructure
# Usage: docker compose -f base.yml -f services.yml up
#
# Contains: Pulsar, PostgreSQL, Redis, ClickHouse, Elasticsearch, Prometheus, Grafana

services:
  # ===== 消息队列 =====
  pulsar:
    image: apachepulsar/pulsar:2.11.2
    container_name: behavior-pulsar
    ports:
      - "6650:6650"
      - "8080:8080"
    command: ["bin/pulsar", "standalone"]
    environment:
      - PULSAR_PREFIX_clusterName=behavior-sense
      - PULSAR_PREFIX_brokerDeleteInactiveTopicsEnabled=false
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - behavior-net

  # ===== 数据库 =====
  postgres:
    image: postgres:15-alpine
    container_name: behavior-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=behavior_sense
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - behavior-net

  # ===== 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: behavior-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - behavior-net

  # ===== 分析存储 =====
  clickhouse:
    image: clickhouse/clickhouse-server:23-alpine
    container_name: behavior-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - behavior-net

  # ===== 搜索引擎 =====
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: behavior-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - behavior-net

  # ===== 监控 =====
  prometheus:
    image: prom/prometheus:latest
    container_name: behavior-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - behavior-net

  grafana:
    image: grafana/grafana:latest
    container_name: behavior-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - behavior-net

volumes:
  postgres-data:
  clickhouse-data:
  es-data:
  grafana-data:

networks:
  behavior-net:
    driver: bridge
