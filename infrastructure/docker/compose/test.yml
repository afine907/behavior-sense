# BehaviorSense - Test Environment
# Usage: docker compose -f test.yml up -d
#
# Lightweight test environment for CI/CD:
# - PostgreSQL on port 5433
# - Redis on port 6380
# - Uses tmpfs for fast cleanup

services:
  # ===== PostgreSQL 测试数据库 =====
  postgres-test:
    image: postgres:15-alpine
    container_name: behavior-test-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=behavior_sense_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  # ===== Redis 测试缓存 =====
  redis-test:
    image: redis:7
    container_name: behavior-test-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /data

networks:
  default:
    name: behavior-test-net
