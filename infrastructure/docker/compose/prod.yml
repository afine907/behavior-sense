# BehaviorSense - Production Environment Override
# Usage: docker compose -f base.yml -f services.yml -f prod.yml up -d
#
# Production-specific configurations:
# - Resource limits
# - Restart policies
# - Production environment variables

services:
  # ===== 基础设施资源限制 =====
  pulsar:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  postgres:
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped

  redis:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  clickhouse:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  elasticsearch:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  # ===== 后端服务生产配置 =====
  mock:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO
      - WORKERS=4

  stream:
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO

  rules:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO
      - WORKERS=4

  insight:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO
      - WORKERS=4

  audit:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO
      - WORKERS=4

  # ===== 前端服务生产配置 =====
  web:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2
    restart: unless-stopped

  # ===== 监控服务生产配置 =====
  prometheus:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  grafana:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
