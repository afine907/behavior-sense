# Docker Compose 测试环境配置
# 用于运行需要外部依赖的集成测试

version: '3.8'

services:
  # ===== PostgreSQL 测试数据库 =====
  postgres-test:
    image: postgres:15-alpine
    container_name: behavior-test-postgres
    ports:
      - "5433:5432"  # 使用不同端口避免与开发环境冲突
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=behavior_sense_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # 使用内存存储，测试完成后自动清理

  # ===== Redis 测试缓存 =====
  redis-test:
    image: redis:7-alpine
    container_name: behavior-test-redis
    ports:
      - "6380:6379"  # 使用不同端口避免与开发环境冲突
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /data  # 使用内存存储

networks:
  default:
    name: behavior-test-net
