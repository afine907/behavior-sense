global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'behavior-mock'
    static_configs:
      - targets: ['mock:8000']
    metrics_path: '/metrics'

  - job_name: 'behavior-rules'
    static_configs:
      - targets: ['rules:8000']
    metrics_path: '/metrics'

  - job_name: 'behavior-insight'
    static_configs:
      - targets: ['insight:8000']
    metrics_path: '/metrics'

  - job_name: 'behavior-audit'
    static_configs:
      - targets: ['audit:8000']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
